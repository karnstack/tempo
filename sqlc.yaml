version: "2"
sql:
  - engine: "sqlite"
    schema: "migrations"
    queries: "internal/storage/sqlite/queries"
    gen:
      go:
        package: "sqlitedb"
        out: "internal/storage/sqlite/sqlitedb"
        sql_package: "database/sql"
        emit_interface: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
