name: Bug report
description: Something isn't working the way the docs/UI suggest it should.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time. Please give enough detail that someone else can reproduce this on their own machine.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences. What's broken?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered list, starting from a fresh `mise run dev-api` + `mise run dev-web` (or the `-raw` variants if you're not using portless) if relevant.
      placeholder: |
        1. Add a connection for `owner/repo`
        2. Wait for first sync to finish
        3. Open `/dashboard/repo/owner/repo`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened
      description: Include the response, the log line, the screenshot — whatever's relevant.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tempo version or commit
      description: Output of `./tempo --version` once available, or the commit SHA you built from.
    validations:
      required: true
  - type: dropdown
    id: connection-kind
    attributes:
      label: GitHub connection kind
      options:
        - repo
        - org
        - n/a (issue is in the UI / setup flow)
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: OS / browser
      description: e.g. macOS 14.4 / Chrome 124 / curl
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Run with `TEMPO_LOG_LEVEL=debug` if you can. Trim PII.
      render: shell
