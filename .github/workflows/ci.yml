name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  go:
    name: Go (test / vet / sqlc / openapi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true

      - name: Set up sqlc
        uses: sqlc-dev/setup-sqlc@v4
        with:
          sqlc-version: '1.31.1'

      - name: sqlc diff
        run: sqlc diff

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=2m
        continue-on-error: true

      - name: go test
        run: go test ./...

      - name: go build
        run: go build ./...

      - name: openapi validate
        run: make openapi-validate

  web:
    name: Web (typecheck / lint / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      # pnpm BEFORE setup-node so setup-node can use the pnpm cache.
      - uses: pnpm/action-setup@v4
        with:
          version: '10.33.4'

      - uses: actions/setup-node@v4
        with:
          node-version: '24.15.0'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: pnpm lint
        run: pnpm run lint

      - name: pnpm typecheck
        run: pnpm run typecheck

      - name: pnpm build
        run: pnpm run build

      - name: openapi:check
        run: pnpm run openapi:check

  docker:
    name: Docker (buildx, no push)
    runs-on: ubuntu-latest
    needs: [go, web]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: tempo:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
