name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  go:
    name: Go (test / vet / sqlc / openapi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # mise installs go / sqlc (and air, though unused in CI) at the
      # versions pinned in .mise.toml. cache: true preserves the
      # toolchain cache between runs.
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: sqlc diff
        run: mise exec -- sqlc diff

      - name: go vet
        run: mise exec -- go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=2m
        continue-on-error: true

      - name: go test
        run: mise exec -- go test ./...

      - name: go build
        run: mise exec -- go build ./...

      - name: openapi validate
        run: mise run openapi-validate

  web:
    name: Web (typecheck / lint / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      # mise installs node + pnpm at the pinned versions from .mise.toml.
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: pnpm install
        run: mise exec -- pnpm install --frozen-lockfile

      - name: pnpm lint
        run: mise exec -- pnpm run lint

      - name: pnpm typecheck
        run: mise exec -- pnpm run typecheck

      - name: pnpm build
        run: mise exec -- pnpm run build

      - name: openapi:check
        run: mise exec -- pnpm run openapi:check

  docker:
    name: Docker (buildx, no push)
    runs-on: ubuntu-latest
    needs: [go, web]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: tempo:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
