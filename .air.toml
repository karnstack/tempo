root = "."
tmp_dir = ".air-tmp"

[build]
  bin = "./.air-tmp/tempo"
  cmd = "go build -o ./.air-tmp/tempo ./cmd/tempo"
  delay = 500
  exclude_dir = ["web", "node_modules", ".plans", "docs", "data", ".air-tmp", "internal/webui/dist"]
  exclude_regex = ["_test.go$"]
  include_ext = ["go"]
  kill_delay = 500
  log = "build-errors.log"
  send_interrupt = true
  stop_on_error = true

[color]
  app = "white"
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = true
